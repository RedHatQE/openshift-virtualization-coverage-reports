apiVersion: apps/v1
kind: Deployment
metadata:
  name: coverage-reports-server
  labels:
    app: coverage-reports
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coverage-reports
      component: server
  template:
    metadata:
      labels:
        app: coverage-reports
        component: server
    spec:
      containers:
        - name: server
          image: ghcr.io/RedHatQE/openshift-virtualization-coverage-reports:latest
          args: ["serve", "--dir", "/data/reports", "--port", "8080"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: reports-data
              mountPath: /data/reports
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: reports-data
          persistentVolumeClaim:
            claimName: coverage-reports-data
---
apiVersion: v1
kind: Service
metadata:
  name: coverage-reports
  labels:
    app: coverage-reports
spec:
  selector:
    app: coverage-reports
    component: server
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
